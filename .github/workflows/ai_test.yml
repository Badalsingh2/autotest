name: Auto-Generate & Run Tests (Groq AI)

on:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]

jobs:
  auto-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: write        # needed to push generated test files back to repo
      pull-requests: write

    steps:
      # ── 1. Checkout code ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Set up Java 17 ───────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Set up Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Install groq SDK ──────────────────────────────────────
      - name: Install groq SDK
        run: pip install groq -q

      # ── 5. Fix misplaced test files ──────────────────────────────
      - name: Fix misplaced test files
        run: |
          echo "🔍 Checking for test files in src/main/java..."
          find src/main/java -name "*Test.java" 2>/dev/null | while read f; do
            DEST="${f/src\/main\/java/src\/test\/java}"
            mkdir -p "$(dirname "$DEST")"
            mv "$f" "$DEST"
            echo "   🚚 Moved: $f → $DEST"
          done
          echo "   ✅ Done."

      # ── 6. Compile project ───────────────────────────────────────
      - name: Compile project
        run: mvn compile -q

      # ── 7. Generate + Run + Fix tests via Groq AI ───────────────
      - name: Generate, Run and Fix tests with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🤖 Running Groq AI test generator..."
          python generate_tests.py 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 TEST RESULTS SUMMARY"
          echo "═══════════════════════════════════════"
          grep -E "Tests run:|BUILD|PASSED|FAILED|ERROR" test-output.txt || true
          echo "═══════════════════════════════════════"

          exit $EXIT_CODE

      # ── 8. Save test report as txt ───────────────────────────────
      - name: Save test report summary
        if: always()
        run: |
          REPORT_FILE="test-report-${{ github.run_number }}.txt"
          echo "=======================================" > $REPORT_FILE
          echo " TEST REPORT — Run #${{ github.run_number }}" >> $REPORT_FILE
          echo " Commit: ${{ github.sha }}" >> $REPORT_FILE
          echo " Branch: ${{ github.ref_name }}" >> $REPORT_FILE
          echo " Date:   $(date -u)" >> $REPORT_FILE
          echo "=======================================" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "--- GROQ GENERATOR OUTPUT ---" >> $REPORT_FILE
          cat test-output.txt >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "--- SUREFIRE SUMMARY ---" >> $REPORT_FILE
          find target/surefire-reports -name "*.txt" 2>/dev/null | while read f; do
            echo "" >> $REPORT_FILE
            echo "### $f ###" >> $REPORT_FILE
            cat "$f" >> $REPORT_FILE
          done
          echo "" >> $REPORT_FILE
          echo "--- JACOCO COVERAGE SUMMARY ---" >> $REPORT_FILE
          if [ -f target/site/jacoco/index.html ]; then
            grep -oP '(?<=<td class="ctr2">)\d+%' target/site/jacoco/index.html | head -10 >> $REPORT_FILE || true
          else
            echo "JaCoCo report not available" >> $REPORT_FILE
          fi
          echo "✅ Report saved: $REPORT_FILE"

      # ── 9. Commit generated test files + report back to repo ─────
      - name: Commit generated tests and report to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/test/java/ || true
          git add test-report-${{ github.run_number }}.txt || true

          if git diff --cached --quiet; then
            echo "ℹ️  Nothing new to commit"
          else
            git commit -m "🤖 [auto-test] Add generated tests + report (run #${{ github.run_number }}) [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Pushed generated tests and report to repo"
          fi

      # ── 10. Publish test results in GitHub UI ────────────────────
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: "Groq AI Generated Test Results"
          comment_on_pr: true

      # ── 11. Upload test reports as artifact ──────────────────────
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            target/surefire-reports/
            target/site/jacoco/
            test-output.txt
            test-report-${{ github.run_number }}.txt
          retention-days: 30

      # ── 12. Upload generated test source files ───────────────────
      - name: Upload Generated Test Sources
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-tests-${{ github.run_number }}
          path: src/test/java/
          retention-days: 7